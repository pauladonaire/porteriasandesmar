<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#004D93">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Personal — IngresoPorterias</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-logo">PorterÍas</div>
  <div class="topbar-predio">
    <div class="topbar-user" id="topbar-user"></div>
    <div id="topbar-predio"></div>
  </div>
  <button id="btn-logout" class="btn btn-outline btn-sm" style="margin-left:8px;min-height:36px;width:auto;padding:6px 12px;font-size:.78rem">Salir</button>
</header>

<main>

<!-- ── PERSONAL — FORMULARIO ──────────────────────── -->
<div id="view-personal" class="view">
  <div class="container form-section">
    <button class="btn-back" data-goto="home">← Volver</button>
    <div class="form-title">Personal</div>
    <div class="form-subtitle">Visitas, clientes y proveedores</div>

    <form id="form-pers-ingreso">
      <div class="field">
        <label>Predio</label>
        <select id="sel-predio-pers" required></select>
      </div>
      <div class="field">
        <label>Tipo de Registro</label>
        <select id="sel-tipo-pers" required>
          <option value="">— Seleccionar —</option>
          <option value="visita">Visita</option>
          <option value="cliente">Cliente</option>
          <option value="proveedor">Proveedor</option>
        </select>
      </div>
      <div class="field">
        <label>Nombre y Apellido</label>
        <input id="pers-nombre" type="text" placeholder="Nombre completo" required>
      </div>
      <div class="field">
        <label>DNI (opcional)</label>
        <input id="pers-dni" type="text" placeholder="ej: 30123456" inputmode="numeric">
      </div>
      <div class="field">
        <label>Forma de Ingreso</label>
        <div class="segmented">
          <input type="radio" name="forma-ingreso" id="fi-vehiculo" value="con_vehiculo">
          <label for="fi-vehiculo">🚗 Con Vehículo</label>
          <input type="radio" name="forma-ingreso" id="fi-pie" value="sin_vehiculo">
          <label for="fi-pie">🚶 A Pie</label>
        </div>
      </div>
      <div class="field" id="row-matricula" style="display:none">
        <label>Matrícula del Vehículo</label>
        <input id="pers-matricula" type="text" placeholder="Ej: ABC123" style="text-transform:uppercase">
      </div>
      <div class="field">
        <label>Observaciones</label>
        <textarea id="pers-obs" placeholder="Motivo de visita, empresa, etc."></textarea>
      </div>
      <button type="submit" class="btn btn-ingreso">↑ Registrar Ingreso</button>
    </form>

    <hr class="divider">
    <button class="btn btn-outline" onclick="App.mostrar('dentro-pers')">Ver personas adentro →</button>
  </div>
</div>

<!-- ── PERSONAL — LISTA ADENTRO ───────────────────── -->
<div id="view-dentro-pers" class="view">
  <div class="container list-section">
    <button class="btn-back" data-goto="personal">← Nueva operación</button>
    <div class="form-title">Personas Adentro</div>
    <div id="lista-pers"></div>
  </div>
</div>

</main>

<nav id="bottom-nav">
  <button class="nav-item" data-pagina="home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Inicio
  </button>
  <button class="nav-item" data-pagina="distribucion">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M1 3h15l3 9H4L1 3z"/><path d="M1 3l3 9v6h16v-6"/><circle cx="7" cy="19" r="2"/><circle cx="17" cy="19" r="2"/></svg>
    Distribuc.
  </button>
  <button class="nav-item" data-pagina="trafico">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
    Tráfico
  </button>
  <button class="nav-item" data-pagina="personal">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Personal
  </button>
  <button class="nav-item" data-pagina="indicadores" data-rol-min="supervisor">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    KPIs
  </button>
</nav>

<!-- ════ MODAL: Egreso de Personal ════ -->
<div id="modal-egreso-pers" class="modal-backdrop" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:150;align-items:center;justify-content:center;padding:16px">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:400px">
    <h3 id="egr-pers-titulo" style="font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;color:var(--egreso);margin-bottom:16px">Egreso</h3>
    <form id="form-egreso-pers">
      <input type="hidden" id="egr-pers-id-mov">
      <div class="field">
        <label>Observaciones al egreso (opcional)</label>
        <textarea id="egr-pers-obs" placeholder="Novedades"></textarea>
      </div>
      <div class="btn-row">
        <button type="button" id="btn-cerrar-egr-pers" class="btn btn-outline">Cancelar</button>
        <button type="submit" class="btn btn-egreso">↓ Confirmar Egreso</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container" aria-live="polite" aria-atomic="true"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/catalogos.js"></script>
<script src="js/nav.js"></script>
<script src="js/personal.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  NavPage.init('personal');
  initPersonal();
  App.mostrar('personal');
  Catalogos.cargar().catch(() => App.toast('No se pudieron cargar los catálogos', 'warn'));
});
</script>
</body>
</html>
