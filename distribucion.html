<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#004D93">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Distribución — IngresoPorterias</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-logo">PorterÍas</div>
  <div class="topbar-predio">
    <div class="topbar-user" id="topbar-user"></div>
    <div id="topbar-predio"></div>
  </div>
  <button id="btn-logout" class="btn btn-outline btn-sm" style="margin-left:8px;min-height:36px;width:auto;padding:6px 12px;font-size:.78rem">Salir</button>
</header>

<main>

<!-- ── DISTRIBUCIÓN — FORMULARIO ──────────────────── -->
<div id="view-distribucion" class="view">
  <div class="container form-section">
    <button class="btn-back" data-goto="home">← Volver</button>
    <div class="form-title">Distribución</div>
    <div class="form-subtitle">Ingreso/egreso de unidades de distribución</div>

    <form id="form-dist-ingreso">
      <div class="field">
        <label>Predio</label>
        <select id="sel-predio-dist" required></select>
      </div>
      <div class="field">
        <label>Unidad (dominio/interno)</label>
        <select id="sel-unidad-dist" required></select>
      </div>
      <div style="margin-bottom:14px;display:flex;gap:8px">
        <button type="button" id="btn-scan-qr" class="btn btn-outline btn-sm" style="width:auto">📷 Escanear QR</button>
        <button type="button" class="btn btn-outline btn-sm" style="width:auto" id="btn-nueva-unidad">+ Nueva Unidad</button>
      </div>
      <div id="qr-reader" style="display:none;max-width:100%"></div>
      <div class="field">
        <label>Chofer</label>
        <div style="display:flex;gap:8px">
          <select id="sel-chofer-dist" style="flex:1"></select>
          <button type="button" class="btn btn-outline btn-sm btn-nuevo-chofer" style="white-space:nowrap;width:auto">+ Chofer</button>
        </div>
      </div>
      <div class="field">
        <label>Estado de Carga al Ingreso</label>
        <div class="segmented">
          <input type="radio" name="estado-carga-dist" id="carga-con" value="con_carga">
          <label for="carga-con">Con Carga</label>
          <input type="radio" name="estado-carga-dist" id="carga-sin" value="sin_carga">
          <label for="carga-sin">Sin Carga</label>
        </div>
      </div>
      <div class="field">
        <label>Detalle de Carga (opcional)</label>
        <input id="det-carga-dist" type="text" placeholder="Ej: Mercadería fría, 12 pallets">
      </div>
      <div class="field">
        <label>Observaciones</label>
        <textarea id="obs-dist" placeholder="Novedades, daños, etc."></textarea>
      </div>
      <button type="submit" class="btn btn-ingreso">↑ Registrar Ingreso</button>
    </form>

    <hr class="divider">
    <button class="btn btn-outline" onclick="App.mostrar('dentro-dist')">Ver unidades adentro →</button>
  </div>
</div>

<!-- ── DISTRIBUCIÓN — LISTA ADENTRO ──────────────── -->
<div id="view-dentro-dist" class="view">
  <div class="container list-section">
    <button class="btn-back" data-goto="distribucion">← Nueva operación</button>
    <div class="form-title">Unidades Adentro</div>
    <div id="lista-dist"></div>
  </div>
</div>

</main>

<nav id="bottom-nav">
  <button class="nav-item" data-pagina="home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Inicio
  </button>
  <button class="nav-item" data-pagina="distribucion">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M1 3h15l3 9H4L1 3z"/><path d="M1 3l3 9v6h16v-6"/><circle cx="7" cy="19" r="2"/><circle cx="17" cy="19" r="2"/></svg>
    Distribuc.
  </button>
  <button class="nav-item" data-pagina="trafico">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
    Tráfico
  </button>
  <button class="nav-item" data-pagina="personal">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Personal
  </button>
  <button class="nav-item" data-pagina="indicadores" data-rol-min="supervisor">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    KPIs
  </button>
</nav>

<!-- ════ MODALES ════ -->

<div id="modal-alta-unidad" class="modal-backdrop" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:150;align-items:center;justify-content:center;padding:16px">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:400px">
    <h3 style="font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;color:var(--brand);margin-bottom:16px">Nueva Unidad</h3>
    <form id="form-alta-unidad">
      <div class="field"><label>Tipo</label>
        <select id="nu-tipo" required>
          <option value="tractor">Tractor</option><option value="semirremolque">Semirremolque</option>
          <option value="chasis">Chasis</option><option value="utilitario">Utilitario</option>
          <option value="furgón">Furgón</option>
        </select>
      </div>
      <div class="field"><label>Dominio *</label>
        <input id="nu-dominio" type="text" required placeholder="Ej: ABC123" style="text-transform:uppercase">
      </div>
      <div class="field"><label>Interno (opcional)</label>
        <input id="nu-interno" type="text" placeholder="Número interno">
      </div>
      <div class="field"><label>Flota</label>
        <select id="nu-flota"><option value="propia">Propia</option><option value="tercero">Tercero</option></select>
      </div>
      <div class="field"><label>Transportista (opcional)</label>
        <input id="nu-transportista" type="text" placeholder="Nombre de la empresa">
      </div>
      <div class="field"><label>Base Habitual (opcional)</label>
        <input id="nu-base" type="text" placeholder="Ej: Mendoza">
      </div>
      <div class="btn-row">
        <button type="button" id="btn-cancelar-unidad" class="btn btn-outline">Cancelar</button>
        <button type="submit" class="btn btn-primary">Dar de Alta</button>
      </div>
    </form>
  </div>
</div>

<div id="modal-alta-chofer" class="modal-backdrop" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:150;align-items:center;justify-content:center;padding:16px">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:400px">
    <h3 style="font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;color:var(--brand);margin-bottom:16px">Nuevo Chofer</h3>
    <form id="form-alta-chofer">
      <div class="field"><label>Nombre y Apellido *</label>
        <input id="nc-nombre" type="text" required placeholder="Juan Pérez">
      </div>
      <div class="field"><label>DNI (opcional)</label>
        <input id="nc-dni" type="text" placeholder="30123456" inputmode="numeric">
      </div>
      <div class="field"><label>Transportista (opcional)</label>
        <input id="nc-transportista" type="text" placeholder="Empresa o cuenta propia">
      </div>
      <div class="btn-row">
        <button type="button" id="btn-cancelar-chofer" class="btn btn-outline">Cancelar</button>
        <button type="submit" class="btn btn-primary">Dar de Alta</button>
      </div>
    </form>
  </div>
</div>

<div id="modal-egreso-dist" class="modal-backdrop" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:150;align-items:center;justify-content:center;padding:16px">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:400px">
    <h3 id="egr-dist-titulo" style="font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;color:var(--egreso);margin-bottom:16px">Egreso</h3>
    <form id="form-egreso-dist">
      <input type="hidden" id="egr-dist-id-mov">
      <div class="field">
        <label>Estado de Carga al Egreso</label>
        <div class="segmented">
          <input type="radio" name="estado-carga-egr-dist" id="egr-carga-con" value="con_carga">
          <label for="egr-carga-con">Con Carga</label>
          <input type="radio" name="estado-carga-egr-dist" id="egr-carga-sin" value="sin_carga">
          <label for="egr-carga-sin">Sin Carga</label>
        </div>
      </div>
      <div class="field"><label>Detalle (opcional)</label>
        <input id="egr-dist-detalle" type="text" placeholder="Ej: Descargó parcialmente">
      </div>
      <div class="field"><label>Observaciones</label>
        <textarea id="egr-dist-obs" placeholder="Novedades al egreso"></textarea>
      </div>
      <div class="btn-row">
        <button type="button" id="btn-cerrar-egr-dist" class="btn btn-outline">Cancelar</button>
        <button type="submit" class="btn btn-egreso">↓ Confirmar Egreso</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container" aria-live="polite" aria-atomic="true"></div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/catalogos.js"></script>
<script src="js/scanner.js"></script>
<script src="js/nav.js"></script>
<script src="js/modales.js"></script>
<script src="js/distribucion.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  NavPage.init('distribucion');
  initAltaUnidad();
  initAltaChofer();
  initDistribucion();
  initScanner();
  App.mostrar('distribucion');
  Catalogos.cargar().catch(() => App.toast('No se pudieron cargar los catálogos', 'warn'));
});
</script>
</body>
</html>
