<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#004D93">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>IngresoPorterias</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-logo">PorterÍas</div>
  <div class="topbar-predio">
    <div class="topbar-user" id="topbar-user"></div>
    <div id="topbar-predio"></div>
  </div>
  <button id="btn-logout" class="btn btn-outline btn-sm" style="margin-left:8px;min-height:36px;width:auto;padding:6px 12px;font-size:.78rem">
    Salir
  </button>
</header>

<main>

<!-- ── LOGIN ─────────────────────────────────────── -->
<div id="view-login" class="view active" data-display="flex">
  <div class="login-box container">
    <div class="login-logo">Porterías</div>
    <div class="login-sub">Sistema de Ingresos y Egresos</div>

    <div class="login-tabs">
      <div class="login-tab active" data-tab="ingresar">Ingresar</div>
      <div class="login-tab" data-tab="registrar">Primera vez</div>
    </div>

    <!-- Panel login -->
    <div class="login-panel active" id="panel-ingresar">
      <form id="form-login">
        <div class="field">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" placeholder="usuario@empresa.com" required autocomplete="email">
        </div>
        <div class="field">
          <label for="login-clave">Clave</label>
          <input id="login-clave" type="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary">Ingresar</button>
      </form>
    </div>

    <!-- Panel registro de clave -->
    <div class="login-panel" id="panel-registrar">
      <p style="font-size:.85rem;color:var(--text-muted);margin-bottom:16px">
        Si ya tenés un usuario creado por el administrador, registrá tu clave aquí.
      </p>
      <form id="form-registro">
        <div class="field">
          <label for="reg-email">Email</label>
          <input id="reg-email" type="email" placeholder="usuario@empresa.com" required autocomplete="email">
        </div>
        <div class="field">
          <label for="reg-clave">Nueva clave (mín. 6 caracteres)</label>
          <input id="reg-clave" type="password" placeholder="••••••••" required minlength="6">
        </div>
        <div class="field">
          <label for="reg-clave2">Repetir clave</label>
          <input id="reg-clave2" type="password" placeholder="••••••••" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary">Registrar Clave</button>
      </form>
    </div>
  </div>
</div>

<!-- ── HOME ──────────────────────────────────────── -->
<div id="view-home" class="view">
  <div class="container">
    <div class="home-grid">
      <!-- Distribución -->
      <div class="type-card dist" onclick="window.location.href='distribucion.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="#2dd4a7" stroke-width="1.8">
          <path d="M1 3h15l3 9H4L1 3z"/><path d="M1 3l3 9v6h16v-6"/><circle cx="7" cy="19" r="2"/><circle cx="17" cy="19" r="2"/>
        </svg>
        <div class="card-title">Distribución</div>
        <div class="badge-count" id="badge-dist">0 dentro</div>
      </div>
      <!-- Tráfico -->
      <div class="type-card traf" onclick="window.location.href='trafico.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="#4aa8ff" stroke-width="1.8">
          <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
        <div class="card-title">Tráfico</div>
        <div class="badge-count" id="badge-traf">0 en ruta</div>
      </div>
      <!-- Personal -->
      <div class="type-card pers" onclick="window.location.href='personal.html'" style="grid-column: span 2">
        <svg viewBox="0 0 24 24" fill="none" stroke="#f5a524" stroke-width="1.8">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <div class="card-title">Personal</div>
        <div class="badge-count" id="badge-pers">0 adentro</div>
      </div>
    </div>

    <!-- ── Dashboard dinámico ─────────────────────────────── -->
    <div id="dash-loading" class="dash-loading" style="display:none">Actualizando...</div>
    <div id="dash-content" style="display:none">

      <!-- Pendientes SITRACK (visible solo si hay pendientes) -->
      <div id="section-sitrack" class="dash-section dash-section--warn" style="display:none">
        <button class="dash-section-header" onclick="App.toggleSection('sitrack-body','chev-sitrack')">
          <span style="font-size:1rem;flex-shrink:0">⚠</span>
          <span class="dash-section-title">Pendientes SITRACK</span>
          <span class="dash-badge-count" id="count-sitrack">0</span>
          <span class="dash-chevron open" id="chev-sitrack">▾</span>
        </button>
        <div id="sitrack-body" class="dash-body"></div>
      </div>

      <!-- Viajes en ruta (siempre visible, incluye días anteriores) -->
      <div class="dash-section dash-section--viaje">
        <button class="dash-section-header" onclick="App.toggleSection('viajes-body','chev-viajes')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--viaje)" stroke-width="2.2" style="flex-shrink:0">
            <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
            <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
          </svg>
          <span class="dash-section-title">Viajes en ruta</span>
          <span class="dash-badge-count" id="count-viajes">0</span>
          <span class="dash-chevron open" id="chev-viajes">▾</span>
        </button>
        <div id="viajes-body" class="dash-body"></div>
      </div>

      <!-- Registros del día -->
      <div class="dash-day-header">
        <span>Registros del día</span>
        <span id="dash-fecha" class="dash-day-date"></span>
      </div>

      <div class="dash-section">
        <button class="dash-section-header" onclick="App.toggleSection('dist-hoy-body','chev-dist')">
          <span class="dash-sub-dot" style="background:var(--ingreso)"></span>
          <span class="dash-section-title">Distribución</span>
          <span class="dash-badge-count" id="count-dist-hoy">0</span>
          <span class="dash-chevron" id="chev-dist">▾</span>
        </button>
        <div id="dist-hoy-body" class="dash-body" style="display:none"></div>
      </div>

      <div class="dash-section">
        <button class="dash-section-header" onclick="App.toggleSection('traf-hoy-body','chev-traf')">
          <span class="dash-sub-dot" style="background:var(--viaje)"></span>
          <span class="dash-section-title">Tráfico</span>
          <span class="dash-badge-count" id="count-traf-hoy">0</span>
          <span class="dash-chevron" id="chev-traf">▾</span>
        </button>
        <div id="traf-hoy-body" class="dash-body" style="display:none"></div>
      </div>

      <div class="dash-section" style="margin-bottom:20px">
        <button class="dash-section-header" onclick="App.toggleSection('pers-hoy-body','chev-pers')">
          <span class="dash-sub-dot" style="background:var(--warn)"></span>
          <span class="dash-section-title">Personal</span>
          <span class="dash-badge-count" id="count-pers-hoy">0</span>
          <span class="dash-chevron" id="chev-pers">▾</span>
        </button>
        <div id="pers-hoy-body" class="dash-body" style="display:none"></div>
      </div>

    </div><!-- /dash-content -->
  </div>
</div>

</main>

<!-- ════ BOTTOM NAV ════ -->
<nav id="bottom-nav" class="hidden">
  <button class="nav-item" data-pagina="home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Inicio
  </button>
  <button class="nav-item" data-pagina="distribucion">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M1 3h15l3 9H4L1 3z"/><path d="M1 3l3 9v6h16v-6"/><circle cx="7" cy="19" r="2"/><circle cx="17" cy="19" r="2"/></svg>
    Distribuc.
  </button>
  <button class="nav-item" data-pagina="trafico">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
    Tráfico
  </button>
  <button class="nav-item" data-pagina="personal">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Personal
  </button>
  <button class="nav-item" data-pagina="indicadores" data-rol-min="supervisor">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    KPIs
  </button>
</nav>

<div id="toast-container" aria-live="polite" aria-atomic="true"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/catalogos.js"></script>
<script src="js/app.js"></script>

</body>
</html>
